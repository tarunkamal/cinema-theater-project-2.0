<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Cinema | Authentication</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #06070d, #161b2f);
      color: #f8f8ff;
      padding: 20px;
    }
    .card {
      width: min(420px, 100%);
      background: rgba(14, 16, 28, 0.95);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 22px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      padding: 24px;
    }
    h1 { margin-top: 0; margin-bottom: 8px; font-size: 1.5rem; }
    p { color: #94a3b8; line-height: 1.6; }
    label { display: block; margin-bottom: 6px; color: #cbd5e1; }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: #fff;
      margin-bottom: 12px;
      outline: none;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff4d6d, #ff7a59);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .error {
      margin-top: 12px;
      color: #ffd1d8;
      background: rgba(255,77,109,0.16);
      border: 1px solid rgba(255,77,109,0.3);
      padding: 10px 12px;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Nova Cinema Access</h1>
    <p>Enter the password from the Python theater booking program to unlock the portal.</p>
    <form method="POST" action="/cinema">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="Enter password" required />
      <button type="submit">Authenticate</button>
    </form>
    <div class="error" id="errorBox">Invalid password. Please try again.</div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('failed') === '1') {
      document.getElementById('errorBox').style.display = 'block';
    }
  </script>
</body>
</html>
